<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" href="assets/scss/reset.css" />
  <link rel="stylesheet" href="assets/scss/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP&family=Kaisei+Decol&family=Kiwi+Maru:wght@300&family=Noto+Serif+JP:wght@200..900&family=Shippori+Mincho&display=swap"
    rel="stylesheet">
  <title>responsive-site</title>
</head>
<body>
  <header class="l-header">
    <a class="c-link c-link--logo" href="#">
      <img class="c-img--logo" src="assets/img/Tea Time.png" alt="TeaTIME">
    </a>
    <div class="p-headerMenu__wrap">
      <ul class="p-headerMenu__nav">
        <li><a class="c-link c-link--header" href="#">Top</a></li>
        <li><a class="c-link c-link--header" href="#">Story</a></li>
        <li><a class="c-link c-link--header" href="#">Products</a></li>
        <li><a class="c-link c-link--header" href="#">Store</a></li>
        <li><a class="c-link c-link--header" href="#">FAQ ↗</a></li>
        <li><a class="c-link c-link--header" href="#">Instagram ↗</a></li>
      </ul>
      <button class="c-btn c-btn--onlineShop">Online Shop</button>
    </div>
  </header>
  <main class="l-main">
    <div class="p-hero">
      <img class="c-img--dot" src="assets/img/2.png" alt="黄色のドット模様">
      <p class="c-text--verticalLeft">Tea's Aroma, A Touch of Happiness.</p>
      <p class="c-text--verticalRight">Tea's Aroma, A Touch of Happiness.</p>
    </div>
    <section class="p-story">
      <div class="p-story__row">
        <div class="p-story__left">
          <img class="c-img c-img--table u-mb--80" src="assets/img/table.png" alt="テーブル">
          <p class="c-text c-text--story">
            たとえば、すてきな絵はがきが届いたとき。<br>
            窓辺のカーテンがやわらかな風に揺れたとき。<br>
            そんな瞬間にふと口にしたくなる、ひと雫のしあわせ。
          </p>
        </div>
        <div class="p-story__right">
          <img class="c-img c-img--teaSweets" src="assets/img/sweets.png" alt="スウィーツ">
        </div>
      </div>
    </section>
  </main>
</body>
